services:
  redis:
    image: redis:7-alpine
    container_name: babylexit-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - babylexit-network

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: babylexit-api
    ports:
      - "8000:8000"
    environment:
      # Database (Supabase)
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      
      # Redis
      - REDIS_URL=redis://redis:6379

      # Celery (Step 11 — Async Indexing / Zero-Downtime)
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2

      # LLM Providers
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      
      # Privacy
      - PII_ENCRYPTION_KEY=${PII_ENCRYPTION_KEY}
      
      # Environment
      - ENVIRONMENT=development
      - LOG_LEVEL=info
    volumes:
      - ./backend:/app
      - /app/__pycache__
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - babylexit-network

  # ── Step 11: Celery Worker — Async Indexing / Zero-Downtime ──────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: babylexit-celery-worker
    environment:
      # Database (Supabase)
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}

      # Redis
      - REDIS_URL=redis://redis:6379

      # Celery
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2

      # LLM Providers
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}

      # Privacy
      - PII_ENCRYPTION_KEY=${PII_ENCRYPTION_KEY}

      # Environment
      - ENVIRONMENT=development
      - LOG_LEVEL=info
    volumes:
      - ./backend:/app
      - /app/__pycache__
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    command: >
      celery -A infrastructure.async_indexing.celery_app worker
      --loglevel=info
      --concurrency=4
      --queues=ingest,default
      --hostname=worker@%h
    healthcheck:
      test: ["CMD", "celery", "-A", "infrastructure.async_indexing.celery_app", "inspect", "ping", "-d", "worker@%h"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - babylexit-network

volumes:
  redis_data:
    driver: local

networks:
  babylexit-network:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    container_name: marinantex-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-marinantex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-marinantex}
      POSTGRES_DB: ${POSTGRES_DB:-marinantex}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-marinantex} -d ${POSTGRES_DB:-marinantex}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - marinantex-network

  redis:
    image: redis:7-alpine
    container_name: marinantex-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - marinantex-network

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: marinantex-minio
    restart: unless-stopped
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - marinantex-network

  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    container_name: marinantex-minio-init
    depends_on:
      - minio
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123};
      mc mb --ignore-existing local/${MINIO_BUCKET:-documents};
      mc anonymous set none local/${MINIO_BUCKET:-documents};
      echo 'MinIO bucket is ready.';
      "
    networks:
      - marinantex-network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  marinantex-network:
    driver: bridge

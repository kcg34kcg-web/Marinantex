name: "CI — Zero-Trust Legal RAG Quality Gate"

# ============================================================================
# Trigger: every push/PR to main or develop
# ============================================================================
on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

env:
  PYTHON_VERSION: "3.12"

# ============================================================================
# Jobs
# ============================================================================
jobs:

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 1 — Full pytest suite (hard gate: all tests must pass)
  # ──────────────────────────────────────────────────────────────────────────
  pytest:
    name: "pytest — Full Test Suite"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: "backend/requirements.txt"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        env:
          # Minimal env — no real services needed (all external I/O is mocked)
          SUPABASE_URL: "https://mock.supabase.co"
          SUPABASE_SERVICE_KEY: "mock-service-key"
          DATABASE_URL: "postgresql://mock:mock@localhost/mock"
          JWT_SECRET_KEY: "ci-test-hmac-secret-key-32-chars!"
          ENVIRONMENT: "test"
        run: |
          python -m pytest tests/ \
            --tb=short \
            -q \
            --no-header \
            --junit-xml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: backend/test-results.xml
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 2 — RAGAS Quality Gate (hard gate: metrics must meet thresholds)
  #          Runs AFTER pytest to avoid wasting compute on broken builds
  # ──────────────────────────────────────────────────────────────────────────
  quality-gate:
    name: "RAGAS Quality Gate"
    runs-on: ubuntu-latest
    needs: pytest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: "backend/requirements.txt"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run RAGAS Quality Gate
        env:
          JWT_SECRET_KEY: "ci-test-hmac-secret-key-32-chars!"
          ENVIRONMENT: "test"
        run: |
          python scripts/quality_gate.py --output quality-report.json
          echo "Quality gate exit code: $?"

      - name: Upload quality report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ragas-quality-report
          path: backend/quality-report.json
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 3 — Pre-release strict gate (only on pushes to main)
  # ──────────────────────────────────────────────────────────────────────────
  quality-gate-strict:
    name: "RAGAS Quality Gate (Strict — pre-release)"
    runs-on: ubuntu-latest
    needs: quality-gate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: "backend/requirements.txt"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run RAGAS Quality Gate (strict thresholds)
        env:
          JWT_SECRET_KEY: "ci-test-hmac-secret-key-32-chars!"
          ENVIRONMENT: "test"
        run: |
          python scripts/quality_gate.py --strict --output quality-report-strict.json

      - name: Upload strict quality report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ragas-quality-report-strict
          path: backend/quality-report-strict.json
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 4 — Static analysis (soft gate: informational, does NOT block merges)
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    name: "Lint & Type Check (informational)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: "backend/requirements.txt"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check . --ignore E501,E402,F401,F811
        continue-on-error: true    # soft: annotations only

      - name: mypy type check
        run: |
          mypy infrastructure/ application/ domain/ api/ \
            --ignore-missing-imports \
            --no-strict-optional \
            --no-error-summary
        continue-on-error: true    # soft: annotations only

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-marinantex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-marinantex}
      POSTGRES_DB: ${POSTGRES_DB:-marinantex}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - prod_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-marinantex} -d ${POSTGRES_DB:-marinantex}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - prod-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - prod_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - prod-network

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - prod_minio_data:/data
    networks:
      - prod-network

  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    restart: "no"
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123};
      mc mb --ignore-existing local/${MINIO_BUCKET:-documents};
      mc anonymous set none local/${MINIO_BUCKET:-documents};
      "
    networks:
      - prod-network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-marinantex}:${POSTGRES_PASSWORD:-marinantex}@postgres:5432/${POSTGRES_DB:-marinantex}?schema=public
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin123}
      S3_BUCKET: ${S3_BUCKET:-documents}
      JWT_SECRET: ${JWT_SECRET:-replace_with_a_long_random_secret_for_local_dev}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      EXPORT_QUEUE_NAME: ${EXPORT_QUEUE_NAME:-document-export}
      EXPORT_URL_TTL_SECONDS: ${EXPORT_URL_TTL_SECONDS:-300}
      EXPORT_OBJECT_RETENTION_HOURS: ${EXPORT_OBJECT_RETENTION_HOURS:-168}
      RATE_LIMIT_TTL_MS: ${RATE_LIMIT_TTL_MS:-60000}
      RATE_LIMIT_LIMIT: ${RATE_LIMIT_LIMIT:-120}
      API_BODY_LIMIT: ${API_BODY_LIMIT:-2mb}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    ports:
      - "${API_PORT:-4000}:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
    networks:
      - prod-network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}
      NEXT_PUBLIC_UYAP_INFO_URL: ${NEXT_PUBLIC_UYAP_INFO_URL:-https://vatandas.uyap.gov.tr/}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Marinantex Legal Editor}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
    networks:
      - prod-network

volumes:
  prod_postgres_data:
  prod_redis_data:
  prod_minio_data:

networks:
  prod-network:
    driver: bridge
